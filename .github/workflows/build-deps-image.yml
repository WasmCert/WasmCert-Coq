name: Build dependency image

# Builds an image based on the Coq/Rocq base image with all coq-wasm deps
# pre-installed, and pushes it to GHCR. The main CI pulls this image instead
# of doing a fresh `opam install` from scratch on every run.
#
# Triggered when the opam file or this workflow's inputs change, and on manual
# dispatch. The first run must be triggered manually from the Actions tab.

on:
  push:
    paths:
      - 'coq-wasm.opam'
      - 'Dockerfile'
      - '.github/workflows/build-deps-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/wasmcert/wasmcert-coq-deps:9.0
            ghcr.io/wasmcert/wasmcert-coq-deps:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
