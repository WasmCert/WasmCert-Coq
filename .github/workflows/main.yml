name: Test compilation

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:
    inputs:

jobs:
  setup:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    outputs:
      owner_lc: ${{ steps.lower.outputs.owner_lc }}
    steps:
      - id: lower
        shell: bash
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # If this push modifies files that cause the prebake image to be rebuilt
  # (coq-wasm.opam, Dockerfile, or the prebake workflow), wait for the
  # "Build dependency image" run on this same commit to finish before letting
  # downstream jobs pull the (potentially stale) image.
  wait-for-prebake:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "Event is ${{ github.event_name }}, not push — prebake does not fire, skipping wait."
            echo "needs_wait=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [[ -z "$BASE" || "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "New branch push (no prior commit); assuming prebake may run."
            echo "needs_wait=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Comparing ${BASE}...${HEAD} via API"
          files=$(gh api "repos/${{ github.repository }}/compare/${BASE}...${HEAD}" --jq '.files[].filename')
          echo "Changed files in this push:"
          echo "$files"
          if echo "$files" | grep -qE '^(coq-wasm\.opam|Dockerfile|\.github/workflows/build-deps-image\.yml)$'; then
            echo "Image-affecting files changed; will wait for prebake."
            echo "needs_wait=true" >> "$GITHUB_OUTPUT"
          else
            echo "No image-affecting changes; not waiting."
            echo "needs_wait=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for prebake workflow
        if: steps.check.outputs.needs_wait == 'true'
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Waiting for build-deps-image.yml run on $SHA in $REPO"
          run_id=""
          for i in $(seq 1 18); do
            run_id=$(gh api \
              "repos/$REPO/actions/workflows/build-deps-image.yml/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0].id // empty' 2>/dev/null || true)
            if [[ -n "$run_id" ]]; then
              echo "Found prebake run id: $run_id"
              break
            fi
            echo "Run not yet visible (attempt $i/18); sleeping 10s..."
            sleep 10
          done
          if [[ -z "$run_id" ]]; then
            echo "Timed out waiting for prebake run to appear in the API." >&2
            exit 1
          fi
          # Blocks until the watched run is completed; --exit-status propagates failure.
          gh run watch "$run_id" --repo "$REPO" --exit-status --interval 15

  build:
    needs: [setup, wait-for-prebake]
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        opam_file:
          - 'coq-wasm.opam'
        coq_version:
          - '9.0'
      fail-fast: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: coq-community/docker-coq-action@v1
        with:
          opam_file: ${{ matrix.opam_file }}
          coq_version: ${{ matrix.coq_version }}
          custom_image: ghcr.io/${{ needs.setup.outputs.owner_lc }}/wasmcert-coq-deps:9.0

          before_install: |
            startGroup "Fix workspace permissions"
              sudo chmod 777 ~/. -R
              sudo chmod 777 . -R
            endGroup
          install: |
            startGroup "Pin local package"
              opam pin add -n -y -k path coq-wasm .
            endGroup
          script: |
            startGroup "Build interpreter in workspace"
              dune build src/wasm_coq_interpreter.exe
            endGroup
          after_script: |
            startGroup "List installed packages"
              opam list
            endGroup

      - name: Upload interpreter binary
        uses: actions/upload-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: _build/default/src/wasm_coq_interpreter.exe
          if-no-files-found: error

  internal-tests:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    container:
      image: ghcr.io/${{ needs.setup.outputs.owner_lc }}/wasmcert-coq-deps:9.0
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Download interpreter binary
        uses: actions/download-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: bin/

      - name: Install interpreter on PATH
        run: install -m 0755 bin/wasm_coq_interpreter.exe /usr/local/bin/wasm_coq_interpreter

      - name: Run mdx tests
        shell: bash
        run: |
          set -euo pipefail
          chown -R rocq:rocq .
          su rocq -s /bin/bash -c '
            set -e
            eval $(opam env)
            cd tests
            for f in *.md; do
              echo "===== $f ====="
              ocaml-mdx test "$f"
            done
          '

  external-tests:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    container:
      image: ghcr.io/${{ needs.setup.outputs.owner_lc }}/wasmcert-coq-deps:9.0
      options: --user root

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download interpreter binary
        uses: actions/download-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: _build/default/src/

      - name: Make binary executable
        run: chmod +x _build/default/src/wasm_coq_interpreter.exe

      - name: Run conformance suite
        run: make run_wast
