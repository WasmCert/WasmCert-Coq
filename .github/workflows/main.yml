name: Test compilation

on:
  push:
  pull_request:
    types: 
      - opened
      - synchronize
      - reopened
      - ready_for_review

  workflow_dispatch:
    inputs:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      matrix:
        opam_file:
          - 'coq-wasm.opam'
        coq_version:
          - '9.0'
      fail-fast: true

    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - uses: coq-community/docker-coq-action@v1
        with:
          opam_file: ${{ matrix.opam_file }}
          coq_version: ${{ matrix.coq_version }}

          before_install: |
            startGroup "install dependencies"
              sudo apt update
              sudo apt install nano --yes

              sudo chmod 777 ~/. -R
              sudo chmod 777 . -R
            endGroup
          after_script: |
            startGroup "List installed packages"
              opam list
            endGroup
            startGroup "Build interpreter into workspace"
              dune build src/wasm_coq_interpreter.exe
            endGroup

      - name: Upload interpreter binary
        uses: actions/upload-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: _build/default/src/wasm_coq_interpreter.exe
          if-no-files-found: error

  internal-tests:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    container:
      image: rocq/rocq-prover:9.0
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - name: Download interpreter binary
        uses: actions/download-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: bin/

      - name: Install interpreter on PATH
        run: install -m 0755 bin/wasm_coq_interpreter.exe /usr/local/bin/wasm_coq_interpreter

      - name: Install mdx and run tests in warm opam switch
        shell: bash
        run: |
          set -euo pipefail
          # Detect the opam user (image-dependent: 'rocq' for rocq/rocq-prover,
          # 'coq' for legacy coqorg/coq images).
          if id -u rocq >/dev/null 2>&1; then
            OPAM_USER=rocq
          elif id -u coq >/dev/null 2>&1; then
            OPAM_USER=coq
          else
            echo "Could not find an opam user (tried rocq, coq). Diagnostics:" >&2
            echo "--- /etc/passwd (non-system uids) ---" >&2
            awk -F: '$3 >= 1000 && $3 < 65000' /etc/passwd >&2 || true
            echo "--- /home ---" >&2
            ls -la /home >&2 || true
            exit 1
          fi
          echo "Detected opam user: $OPAM_USER"
          chown -R "$OPAM_USER":"$OPAM_USER" .
          su "$OPAM_USER" -s /bin/bash -c '
            set -e
            eval $(opam env)
            opam install mdx --yes
            cd tests
            for f in *.md; do
              echo "===== $f ====="
              opam exec -- mdx test "$f"
            done
          '

  external-tests:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - name: Download interpreter binary
        uses: actions/download-artifact@v4
        with:
          name: wasm_coq_interpreter
          path: _build/default/src/

      - name: Make binary executable
        run: chmod +x _build/default/src/wasm_coq_interpreter.exe

      - name: Run conformance suite
        run: make run_wast
