name: Deploy Rocqnavi API Documentation

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        coq_version:
          - '9.0'
      fail-fast: true

    steps:
      - uses: actions/checkout@v6

      - uses: coq-community/docker-coq-action@v1
        with:
          opam_file: 'coq-wasm.opam'
          coq_version: ${{ matrix.coq_version }}

          before_install: |
            startGroup "install dependencies"
              sudo apt update
              sudo apt install -y graphviz

              sudo chmod 777 ~/. -R
              sudo chmod 777 . -R

              opam install mdx --yes
            endGroup
          after_script: |
            startGroup "Install Rocqnavi"
              opam install -y rocq-navi
            endGroup
            startGroup "List installed packages"
              opam list
              ls -al
            endGroup
            startGroup "Build"
              dune build
              ls -al
            endGroup
            startGroup "Generate API Document"
              ./mkdoc.sh html
            endGroup

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: my-docs
          path: html

  deploy:
    needs: build-matrix
    if: github.ref == 'refs/heads/master'

    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5